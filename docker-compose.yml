version: '3.8'

services:
  # ------------------------------------------------------------------------------
  # Database Service (MySQL 8.4)
  # ------------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: scamshield-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-scamshield_db}
      MYSQL_USER: ${DB_USER:-scamshield_admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-YourSecureSuperPassword123!}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootSecureSuperPassword123!}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - scamshield-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------------------
  # Backend API Service (Spring Boot)
  # ------------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scamshield-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${DB_NAME:-scamshield_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-scamshield_admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-YourSecureSuperPassword123!}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - JWT_REFRESH_EXPIRATION_MS=${JWT_REFRESH_EXPIRATION_MS:-604800000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - scamshield-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------------------------
  # Frontend UI Service (React SPA served via Nginx)
  # ------------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: scamshield-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - scamshield-network

networks:
  scamshield-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
