# ==============================================================================
# AI ScamShield - Application Base Configuration
# ==============================================================================
server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ai-scamshield
  profiles:
    active: dev

  # Database Connectivity Setup
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:scamshield_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:scamshield_admin}
    password: ${DB_PASSWORD:YourSecureSuperPassword123!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: scamshield-hikari-pool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

  # JPA & Hibernate Configurations
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate # Enforce database consistency via migrations
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Flyway Schema Migrations Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    locations: classpath:db/migration

# ==============================================================================
# Spring Actuator Telemetry Configurations
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# ==============================================================================
# Springdoc OpenAPI (Swagger UI) Configuration
# ==============================================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: false

# ==============================================================================
# Platform Logging Setup (Structured Console Logging)
# ==============================================================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.scamshield: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# ==============================================================================
# Security & JWT Tokens Configuration Custom Blocks
# ==============================================================================
app:
  security:
    jwt:
      secret: ${JWT_SECRET:U29tZVN1cGVyU2VjcmV0S2V5Rm9yQUlTY2FtU2hpZWxkUGhhc2UxRm91bmRhdGlvblNldHVwMTIzNDU2Nzg5MA==}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}       # 24 Hours
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 Days
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
